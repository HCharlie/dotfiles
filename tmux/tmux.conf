# Notes:
# set == set-option
# setw == set-window-option
# bind == bind-key
# -n(No Prefix): Tells tmux that the key should work without pressing the prefix. This is essential for your Alt-key shortcuts
# -r(Repeatable): Allows the command to be repeated without pressing the key again within the 'repeat-time' limit(great for resizing panes).
# -T(Key Table) Specifies which key table to bind to (e.g., copy-mode-vi).


# Set the TPM plugin directory to follow XDG Base Dir Spec
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins/"

unbind e
bind e source-file ~/.config/tmux/tmux.conf
unbind r
bind r command-prompt "rename-window %%"

# Changing the prefix to ctrl + a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split windows (opens in same directory as current pane) 
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# # Split panes vertically using the current path
# bind % split-window -h -c "#{pane_current_path}"

# # Split panes horizontally using the current path
# bind '"' split-window -v -c "#{pane_current_path}"

# claude code documentation https://code.claude.com/docs/en/terminal-config
set -g allow-passthrough on

# mouse scroll
set -g mouse on

# OSC 8 hyperlinks passthrough (Ghostty + tmux-256color)
# with mouse on, one needs to hold shift and command to click on hyperlinks in tmux
# otherwise off the mouse scroll and use just the command key to click on hyperlinks in tmux
set -ga terminal-features ",xterm-ghostty:hyperlinks"
set -ga terminal-features ",tmux-256color:hyperlinks"


# Starting numbering at 1
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1

set -g renumber-windows on
set -g history-limit 10000
# set-option -g automatic-rename off
# set-option -g allow-rename off
# set-option -g status-position top

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# Alt/Option+hjkl to switch panes without prefix
# inspired from https://www.youtube.com/watch?v=XivdyrFCV4M
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vim style copying
setw -g mode-keys vi

# Monitor for activity in other windows
setw -g monitor-activity on
set -g visual-activity off  # Don't show tmux's own message

# Enable bell notifications (important for notifications to work)
set -g bell-action any
set -g visual-bell both



set -g @plugin 'tmux-plugins/tpm'
 
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# for url links
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'


run '${XDG_DATA_HOME}/tmux/plugins/tpm/tpm'

